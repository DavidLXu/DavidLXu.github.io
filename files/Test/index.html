    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      :root {
        --bg: #091121;
        --text: #eef4ff;
        --accent: #00e39f;
        --dot-size: 14px;
        --dot-border: 2px;
        --pulse-radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      #app {
        position: fixed;
        inset: 0;
      }

      #map {
        position: absolute;
        inset: 0;
      }

      .city-dot {
        width: var(--dot-size);
        height: var(--dot-size);
        border-radius: 999px;
        background: var(--accent);
        border: var(--dot-border) solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 0 0 0 rgba(0, 227, 159, 0.65);
        animation: pulse 1.8s infinite;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(0, 227, 159, 0.6);
        }
        70% {
          box-shadow: 0 0 0 var(--pulse-radius) rgba(0, 227, 159, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(0, 227, 159, 0);
        }
      }

    </style>
  </head>

      window.CITY_MAP_STATS = { cityCount: cities.length };
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(
          { type: "CITY_MAP_STATS", cityCount: cities.length },
          "*"
        );
      }

      const map = L.map("map", {
        worldCopyJump: true,
        minZoom: 2,
        zoomControl: true,
        attributionControl: false
      }).setView([26, 70], 2);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19
      }).addTo(map);

      const cityIcon = L.divIcon({
        className: "",
        html: '<div class="city-dot" title="City marker"></div>',
        iconSize: [14, 14],
        iconAnchor: [7, 7]
      });

      cities.forEach((city) => {
        const marker = L.marker([city.lat, city.lng], { icon: cityIcon }).addTo(map);
        marker.bindTooltip(city.name, { direction: "top", offset: [0, -9], opacity: 0.95 });
      });

      function updateDotScaleByZoom() {
        const zoom = map.getZoom();
        const root = document.documentElement;

        if (zoom <= 3) {
          root.style.setProperty("--dot-size", "7px");
          root.style.setProperty("--dot-border", "1px");
          root.style.setProperty("--pulse-radius", "8px");
          return;
        }

        if (zoom <= 4) {
          root.style.setProperty("--dot-size", "9px");
          root.style.setProperty("--dot-border", "1.5px");
          root.style.setProperty("--pulse-radius", "10px");
          return;
        }

        if (zoom <= 5) {
          root.style.setProperty("--dot-size", "11px");
          root.style.setProperty("--dot-border", "1.5px");
          root.style.setProperty("--pulse-radius", "12px");
          return;
        }

        root.style.setProperty("--dot-size", "14px");
        root.style.setProperty("--dot-border", "2px");
        root.style.setProperty("--pulse-radius", "14px");
      }

      map.on("zoomend", updateDotScaleByZoom);
      updateDotScaleByZoom();
